name: Deploy SaaS Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: noderax-saas-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build And Deploy Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          : "${CLOUDFLARE_API_TOKEN:?Missing CLOUDFLARE_API_TOKEN secret}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Missing CLOUDFLARE_ACCOUNT_ID secret}"

      - name: Lint
        run: pnpm lint

      - name: Verify Cloudflare auth
        shell: bash
        run: pnpm exec wrangler whoami --account "${CLOUDFLARE_ACCOUNT_ID}"

      - name: Verify R2 bucket access
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec wrangler r2 bucket list | grep -F "noderax-saas-opennext-cache"

      - name: Deploy Worker
        run: pnpm run deploy
